repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: "ruff auto-fix"
        entry: uv run --group dev ruff check
        language: system
        types: [python]
        args:
          - "--fix"
          - "--force-exclude"  # respect pyproject.toml's exclude settings even when passing in explicit file list
      - id: ruff-format
        name: "ruff format"
        entry: uv run --group dev ruff format
        language: system
        types: [python]
        args:
          - "--force-exclude"  # respect pyproject.toml's exclude settings even when passing in explicit file list
      - id: mypy
        name: mypy
        entry: uv run --group dev mypy
        language: system
        pass_filenames: false
        types: [python]
      - id: openapi
        name: "openapi spec"
        entry: uv run python server/openapi/generate.py
        language: system
        pass_filenames: false
        types: [python]
      - id: tsc
        name: "tsc"
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
