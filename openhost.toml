[app]
name = "md-notes"
version = "0.1.0"
description = "Obsidian-like markdown notes app with live preview and Yjs sync"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"
# All routes are public — the app handles its own auth via API key.
# OpenHost router owner sessions are also accepted (X-OpenHost-Is-Owner).
public_paths = ["/"]

[resources]
memory_mb = 256
cpu_millicores = 200

[data]
sqlite = ["main"]
app_data = true
